# nom-py policy configuration

upstream:
  endpoint: "http://localhost:9001/mcp"
  auth: "none"

github:
  enabled: false
  callback_url: "http://localhost:8001/oauth/github/callback"

auth:
  enabled: true
  admin_token: "nom-admin-secret"
  tokens:
    "tok-alice":
      user_id: "alice"
      groups: ["developers", "analysts"]
    "tok-bob":
      user_id: "bob"
      groups: ["analysts"]

tools:
  get_weather:
    allow: true
    allowed_groups: ["developers"]

  list_users:
    allow: true
    allowed_groups: ["analysts"]

  delete_user:
    allow: false
    reason: "destructive operations not permitted via this gateway"

  admin_reset:
    allow: false
    reason: "admin tools restricted to internal services only"